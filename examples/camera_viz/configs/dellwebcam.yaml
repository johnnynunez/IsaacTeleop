#
# V4L2 source configured for the DELL Display 4MP Webcam (USB ID 413c:d005).
# Same YAML drives both camera_viz (receiver) and camera_streamer (RTP sender).
# Flip top-level ``source: local|rtp`` to control what camera_viz opens;
# camera_streamer always reads cameras + rtp ports + streaming.host.
#
# DELL Display 4MP Webcam V4L2 node layout (on THIS machine):
#   /dev/video0  — main capture node  ← used here
#   /dev/video1  — metadata (no capture)
#   /dev/video2  — secondary capture (NV12 only)
#   /dev/video3  — metadata (no capture)
#
# Format note: this webcam offers 1920x1080 ONLY via MJPG. Its YUYV mode
# tops out at 640x480, so MJPG is selected below for 1080p30.
#
# To inspect available resolutions and formats on the capture node:
#   sudo apt install v4l-utils
#   v4l2-ctl --device=/dev/video0 --list-formats-ext

source: local                   # local | rtp
streaming:
  host: 127.0.0.1               # camera_streamer target (override with --host)
encoder: auto                   # auto | native | gstreamer
                                # auto picks native NVENC on desktop, GStreamer on Jetson

cameras:
  - name: cam
    enabled: true
    type: v4l2
    device: /dev/video0         # DELL Display 4MP Webcam main capture node
    width: 1920
    height: 1080
    fps: 30
    fourcc: MJPG               # webcam only offers 1920x1080 via MJPG (YUYV maxes at 640x480)
    rtp:                        # used by camera_streamer + source: rtp receivers
      port: 5000
      bitrate_mbps: 15          # camera_streamer default; lower for tight uplinks
      # gop:                    # default: fps*5 (IDR every 5 s, ULL tuning)

display:
  mode: window                  # window | xr
  window:
    width: 1920
    height: 1080
  xr:
    near_z: 0.05
    far_z: 100.0
  clear_color: [0.0, 0.0, 0.0, 0.0]
  placements:
    cam:                        # size defaults to 1.0 m wide × aspect-derived height
      lock_mode: lazy
      distance: 1.5
