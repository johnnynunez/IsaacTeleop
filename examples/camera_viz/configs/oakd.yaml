#
# OAK-D (mono RGB) — same YAML drives camera_viz + camera_streamer.
#
# Mono-only by design until per-eye QuadLayer binding lands (see memory
# note "Stereo XR rendering needs per-view QuadLayer buffers"). Stereo
# OAK-D would otherwise render the same plane to both eyes — misleading.
#
# RTP path: OAK-D's USB raw BGR frames go through depthai's
# getCvFrame() (BGR888p → packed BGR) which the GPU kernel converts to
# RGBA, then our NVENC encodes to H.264 (BT.709 limited-range). Future
# work: opt-in to OAK-D's on-device VPU encoder to skip the host-side
# NVENC entirely (would emit BT.601 full-range and require the decoder
# to switch matrices — not yet wired).

source: local                   # local | rtp
streaming:
  host: 127.0.0.1
encoder: auto                   # auto | native | gstreamer

cameras:
  - name: oakd
    enabled: true
    type: oakd
    mode: mono                  # mono | stereo | stereo_rgb (mono only for now)
    device_id: ""               # empty → first available; use list-cameras to pick
    camera_socket: RGB          # mono mode: which sensor
    width: 1280
    height: 720
    fps: 30
    rtp:
      port: 5000
      bitrate_mbps: 15
      # gop:                    # default: fps*5 (ULL tuning)

display:
  mode: xr                      # xr | window (xr is the default)
  window:
    width: 1280
    height: 720
  xr:
    near_z: 0.05
    far_z: 100.0
  clear_color: [0.0, 0.0, 0.0, 0.0]
  placements:
    oakd:                       # size defaults to 1.0 m wide × aspect-derived height
      lock_mode: lazy
      distance: 1.5
