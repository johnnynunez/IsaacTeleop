name: Setup uv
description: Install pinned uv version for CI jobs.

runs:
  using: composite
  steps:
    - name: Install uv
      # v8.2.0
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        # Pinning explicitly avoids setup-uv version-resolution API calls and fallback paths.
        version: "0.10.6"
